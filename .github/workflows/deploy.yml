name: CI/CD Laravel Docker

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skilloka_backend

jobs:

# ================= TEST =================
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_pgsql

      - run: composer install --no-progress

      - run: cp .env.example .env

      - run: php artisan key:generate

      - run: php artisan test || true


# ================= BUILD =================
  build:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: umamkhoirul06
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/umamkhoirul06/skilloka_backend:latest


# ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022

          script: |

            docker login ghcr.io \
            -u umamkhoirul06 \
            -p ${{ secrets.GHCR_TOKEN }}

            cd /home/${{ secrets.SERVER_USER }}/RPL2B-kelompok-4

            docker pull ghcr.io/umamkhoirul06/skilloka_backend:latest

            docker compose down

            docker compose up -d

            docker compose exec -T app php artisan migrate --force