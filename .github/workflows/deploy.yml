name: CI/CD Laravel Docker

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skilloka_backend


jobs:

# ================= TEST =================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_pgsql

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run test
        run: php artisan test || true



# ================= BUILD IMAGE =================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: umamkhoirul06
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/umamkhoirul06/skilloka_backend:latest



# ================= DEPLOY VPS =================
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022

          script: |

            echo "🚀 mulai deploy"

            cd /home/${{ secrets.SERVER_USER }}/RPL2B-kelompok-4

            echo "📦 pull image terbaru"
            docker pull ghcr.io/umamkhoirul06/skilloka_backend:latest

            echo "🛑 stop container lama"
            docker compose down

            echo "▶️ jalankan container baru"
            docker compose up -d

            echo "⏳ tunggu database ready"
            sleep 20

            docker compose ps

            echo "🧱 migrate database"
            docker compose exec -T app php artisan migrate --force || true

            echo "✅ deploy selesai"